# Render Blueprint — deploy Label Studio (image Docker resmi) + Postgres Neon (gratis & persisten).
# Pakai: dashboard Render -> New -> Blueprint -> pilih repo ini -> Apply,
# lalu isi 4 nilai POSTGRE_* (dari connection string Neon) saat diminta.
#
# Kenapa Neon: Postgres free yang TIDAK dihapus 30 hari (beda dgn Postgres free Render).
# Catatan: web service free tetap "tidur" saat idle (akses pertama lambat bangun).

services:
  - type: web
    name: jokowi-label-studio
    runtime: image
    plan: free
    region: oregon
    image:
      url: docker.io/heartexlabs/label-studio:latest
    # Bind ke port yang diberikan Render ($PORT), bukan 8080 default.
    dockerCommand: label-studio start --host 0.0.0.0 --port $PORT --no-browser
    healthCheckPath: /health
    envVars:
      # ---- Pilih engine Postgres + paksa SSL (wajib utk Neon) ----
      - key: DJANGO_DB
        value: default
      - key: PGSSLMODE
        value: require
      - key: POSTGRE_PORT
        value: "5432"
      # ---- Kredensial Neon: diisi di dashboard, TIDAK disimpan di repo ----
      - key: POSTGRE_HOST          # mis. ep-xxxx-xxxx.us-east-2.aws.neon.tech
        sync: false
      - key: POSTGRE_NAME          # mis. neondb
        sync: false
      - key: POSTGRE_USER          # mis. neondb_owner
        sync: false
      - key: POSTGRE_PASSWORD      # password dari Neon
        sync: false
      # ---- Host & CSRF (URL publik Render) ----
      # Kalau nama service ditambah sufiks oleh Render, sesuaikan 2 nilai ini
      # ke URL asli di dashboard (Settings -> Environment).
      - key: LABEL_STUDIO_HOST
        value: https://jokowi-label-studio.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://jokowi-label-studio.onrender.com
